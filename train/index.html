<html lang="ko">
<head>

    <style>
        :root {
            --bg: #0b131a;
            --panel: #1a2535;
            --panel2: #2c3e50;
            --border: #2a3f55;
            --blue: #0097da;
            --green: #2ecc71;
            --red: #e74c3c;
            --orange: #f39c12;
            --text: #ecf0f1;
            --muted: #7f8c8d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; height: 100dvh;

    .cab {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        padding: env(safe-area-inset-top, 4px) 10px env(safe-area-inset-bottom, 4px) 10px;
        gap: 6px;
    }

    /* ── 상단 바 ── */
    .top-bar {
        flex-shrink: 0;
        background: #111;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        border: 1px solid var(--border);
        gap: 8px;
    }
    .route-select {
        background: #1a2535; color: var(--text);
        border: 1px solid var(--border); border-radius: 6px;
        padding: 4px 6px; font-size: 0.72rem; flex-shrink: 0;
    }
    .station-board {
        flex: 1; text-align: center;
        background: #000; border: 1px solid var(--blue);
        border-radius: 6px; padding: 4px 8px;
    }
    .station-board .next-label { font-size: 0.58rem; color: var(--muted); }
    .station-board .next-name { font-size: 0.85rem; font-weight: bold; color: var(--green); }
    .clock { font-family: monospace; font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }

    /* ── 속도계 ── */
    .speed-section {
        flex-shrink: 0;
        background: #000;
        border-radius: 12px;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        gap: 16px;
    }
    .speed-display { text-align: center; }
    .speed-num {
        font-size: clamp(3rem, 14vw, 4.5rem);
        font-family: 'Courier New', monospace;
        color: var(--green);
        line-height: 1;
        font-weight: bold;
    }
    .speed-num.eb { color: var(--red); animation: blink .5s infinite; }
    .speed-unit { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    /* 속도 게이지 바 */
    .speed-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .bar-row { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--muted); }
    .bar-bg { flex: 1; height: 8px; background: #1a2535; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .15s; }

    /* ── 객실 현황 ── */
    .occupancy-board {
        flex-shrink: 0;
        background: var(--panel);
        border-radius: 8px;
        border: 1px solid var(--border);
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 5px 8px;
        gap: 3px;
    }
    .car-unit { flex: 1; text-align: center; font-size: 0.5rem; color: var(--muted); }
    .car-bar-bg { width: 80%; height: 18px; background: #111; border-radius: 3px; margin: 2px auto; position: relative; overflow: hidden; }
    .car-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; background: var(--green); transition: height .3s; }
    .car-door-ind { height: 3px; border-radius: 1px; margin-top: 2px; background: var(--green); transition: background .3s; }
    .car-door-ind.open { background: var(--red); animation: blink .5s infinite; }

    /* ── TCMS 상태 ── */
    .tcms-section {
        flex-shrink: 0;
        background: var(--panel);
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
        gap: 3px;
    }
    .tcms-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.72rem; }
    .tcms-status { display: flex; gap: 10px; }
    .tcms-item { font-size: 0.68rem; }
    .tcms-btns { display: flex; gap: 6px; }
    .tcms-btn {
        background: #34495e; color: white; border: none;
        padding: 5px 10px; border-radius: 6px; font-size: 0.65rem;
        font-family: inherit; cursor: pointer;
    }
    .tcms-btn.active { background: var(--blue); }

    /* ── 레버 구역 ── */
    .lever-section {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        min-height: 0;
    }
    .lever-panel {
        background: var(--panel2);
        border-radius: 12px;
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 10px 8px;
        gap: 6px;
    }
    .lever-title { font-size: 0.68rem; font-weight: bold; }
    .lever-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
    }
    input[type=range].vlever {
        -webkit-appearance: none;
        appearance: none;
        width: 120px;
        height: 28px;
        background: #111;
        transform: rotate(-90deg);
        border-radius: 14px;
        border: 2px solid #555;
        outline: none;
    }
    input[type=range].vlever::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 32px; height: 32px;
        background: #bdc3c7;
        border-radius: 4px;
        border: 2px solid #7f8c8d;
    }
    .lever-val {
        font-size: 1.2rem; font-weight: bold;
        padding: 3px 10px; background: #000; border-radius: 6px;
        min-width: 52px; text-align: center;
    }
    .lever-btns { display: flex; flex-direction: column; gap: 5px; width: 100%; }
    .lbtn {
        width: 100%; padding: 9px 4px; border: none; border-radius: 8px;
        font-weight: bold; font-size: 0.72rem; color: white;
        font-family: inherit; cursor: pointer;
    }
    .lbtn:active { filter: brightness(1.2); transform: scale(0.97); }
    .lbtn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }
    .lbtn-door-open { background: #f1c40f; color: #111; }
    .lbtn-door-close { background: #7f8c8d; }
    .lbtn-arrive { background: #c0392b; }
    .lbtn-eb { background: linear-gradient(135deg, #ff4d4d, #990000); }
    .lbtn-eb-release { background: #e67e22; animation: blink .8s infinite; display: none; }

    /* ── 하단 무전기/안내방송 ── */
    .bottom-bar {
        flex-shrink: 0;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 8px;
    }
    .radio-box {
        background: #1e1e1e; border: 2px solid var(--border);
        border-radius: 10px; display: flex; align-items: center;
        padding: 6px 8px; gap: 8px;
    }
    .ptt-btn {
        width: 38px; height: 38px; background: #c0392b;
        border-radius: 6px; border: none; cursor: pointer; flex-shrink: 0;
    }
    .ptt-btn:active { background: #ff2222; }
    .radio-status { font-size: 0.62rem; color: var(--muted); }
    .radio-status strong { display: block; color: var(--text); font-size: 0.68rem; }
    .ann-grid {
        background: var(--panel2); border-radius: 10px;
        display: grid; grid-template-columns: repeat(3, 1fr);
        gap: 5px; padding: 6px;
    }
    .ann-btn {
        background: #34495e; color: white; border: 1px solid #555;
        border-radius: 6px; font-size: 0.68rem; padding: 6px 2px;
        font-family: inherit; cursor: pointer;
    }
    .ann-btn:active { background: var(--blue); }
    .ann-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    @keyframes blink { 50% { opacity: 0.3; } }
</style>

            <span id="brkValDisp" style="width:24px;text-align:right">B8</span>

        <div class="bar-row">

</div>

<script>
    const stations = ["서울역","공덕","홍대입구","디지털미디어시티","마곡나루","김포공항","계양","검암","청라국제도시","영종","운서","공항화물청사","인천공항1터미널","인천공항2터미널"];
    let currentRoute = [];
    let sIdx = 0;
    let speed = 0;
    let isDoorOpen = true;
    let isEB = false;
    let hvac = false;
    let light = false;
    let hasArrivedAtCurrentStation = true;
    let occupancyLevels = [20, 45, 80, 55, 30];

    function initRoute() {
        const dir = document.getElementById('routeSelect').value;
        currentRoute = dir === 'toIncheon' ? [...stations] : [...stations].reverse();
        sIdx = 0; speed = 0; isEB = false;
        hasArrivedAtCurrentStation = true;
        document.getElementById('btnEBRelease').style.display = 'none';
        document.getElementById('speedDisp').classList.remove('eb');
        document.getElementById('pwrLev').value = 0;
        document.getElementById('brkLev').value = 8;
        createOccupancyBoard();
        updateUI();
    }

    function createOccupancyBoard() {
        const board = document.getElementById('occupancyBoard');
        board.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
            const car = document.createElement('div');
            car.className = 'car-unit';
            const pct = occupancyLevels[i - 1];
            car.innerHTML = `
                <div>${i}호</div>
                <div class="car-bar-bg">
                    <div class="car-bar-fill" style="height:${pct}%"></div>
                </div>
                <div id="door-ind-${i}" class="car-door-ind ${isDoorOpen ? 'open' : ''}"></div>
                <div>${pct}%</div>
            `;
            board.appendChild(car);
        }
    }

    // 메인 루프
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('ko-KR', {hour12: false});

        const pwr = parseInt(document.getElementById('pwrLev').value);
        const brk = parseInt(document.getElementById('brkLev').value);

        // 레버값 표시
        document.getElementById('pwrVal').innerText = "P" + pwr;
        document.getElementById('brkVal').innerText = brk === 0 ? "RUN" : "B" + brk;
        document.getElementById('pwrValDisp').innerText = "P" + pwr;
        document.getElementById('brkValDisp').innerText = brk === 0 ? "RUN" : "B" + brk;
        document.getElementById('pwrBar').style.width = (pwr / 5 * 100) + '%';
        document.getElementById('brkBar').style.width = (brk / 8 * 100) + '%';

        if (isEB) {
            speed -= 5.0;
            if (speed <= 0) {
                speed = 0;
                document.getElementById('btnEBRelease').style.display = 'block';
            }
        } else {
            if (pwr > 0 && brk === 0 && !isDoorOpen) {
                speed += pwr * 0.35;
                if (hasArrivedAtCurrentStation) {
                    hasArrivedAtCurrentStation = false;
                    document.getElementById('arriveLockStatus').innerText = "● 주행 중";
                    document.getElementById('arriveLockStatus').style.color = "white";
                    updateUI();
                }
            }
            if (brk > 0) speed -= brk * 0.6;
            else speed -= 0.1;
        }

        if (speed < 0) speed = 0;
        if (speed > 110) speed = 110;

        const spd = Math.floor(speed);
        document.getElementById('speedDisp').innerText = spd;
        document.getElementById('spdBar').style.width = (spd / 110 * 100) + '%';
        document.getElementById('spdPct').innerText = Math.round(spd / 110 * 100) + '%';
        document.getElementById('btnArrive').disabled = !(spd === 0 && !isEB && !hasArrivedAtCurrentStation);
    }, 100);

    function emergencyBrake() {
        isEB = true;
        document.getElementById('brkLev').value = 8;
        document.getElementById('speedDisp').classList.add('eb');
        document.getElementById('arriveLockStatus').innerText = "● 긴급제동!";
        document.getElementById('arriveLockStatus').style.color = "var(--red)";
        speak("긴급 제동!");
    }

    function releaseEB() {
        isEB = false;
        document.getElementById('pwrLev').value = 0;
        document.getElementById('brkLev').value = 8;
        document.getElementById('btnEBRelease').style.display = 'none';
        document.getElementById('speedDisp').classList.remove('eb');
        document.getElementById('arriveLockStatus').innerText = "● 출발대기";
        document.getElementById('arriveLockStatus').style.color = "var(--orange)";
        speak("긴급 제동 해제. 출발 준비.");
    }

    function handleDoor(open) {
        if (speed > 0) { speak("주행 중에는 문을 열 수 없습니다."); return; }
        isDoorOpen = open;
        document.getElementById('doorStatus').innerText = open ? "● 출입문: 열림" : "● 출입문: 닫힘";
        document.getElementById('doorStatus').style.color = open ? "var(--red)" : "var(--green)";
        document.querySelectorAll('[id^="door-ind-"]').forEach(el => {
            el.classList.toggle('open', open);
        });
        speak(open ? "문이 열립니다." : "문이 닫힙니다.");
    }

    function pressArrive() {
        if (hasArrivedAtCurrentStation) return;
        if (sIdx < currentRoute.length - 2) {
            sIdx++;
            hasArrivedAtCurrentStation = true;
            updateUI();
            document.getElementById('arriveLockStatus').innerText = "● 도착 완료";
            document.getElementById('arriveLockStatus').style.color = "var(--green)";
            speak("잠시 후 도착합니다.");
        }
    }

    function updateUI() {
        const next = currentRoute[sIdx + 1] || "종착역";
        document.getElementById('nextStation').innerText = next;
        document.getElementById('btnTerm').disabled = sIdx + 1 !== currentRoute.length - 1;
    }

    function toggleTcms(type) {
        if (type === 'hvac') {
            hvac = !hvac;
            document.getElementById('hvacStatus').innerText = hvac ? "● 냉난방: 가동 중" : "● 냉난방: 정지";
            document.getElementById('btnHvac').classList.toggle('active', hvac);
        } else {
            light = !light;
            document.getElementById('lightStatus').innerText = light ? "● 객실조명: 점등" : "● 객실조명: 소등";
            document.getElementById('btnLight').classList.toggle('active', light);
        }
    }

    function radioOn() { document.getElementById('radioStatus').innerText = " 송신 중..."; }
    function radioOff() {
        document.getElementById('radioStatus').innerText = " 수신 중...";
        setTimeout(() => speak("관제실입니다. 말씀하세요."), 400);
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ko-KR';
        window.speechSynthesis.speak(msg);
    }

    function playAnn(type) {
        const next = currentRoute[sIdx + 1];
        if (type === 1) speak(`이번 역은 ${next}, ${next} 역입니다. 내리실 문은 왼쪽입니다.`);
        else if (type === 2) speak(`승강장과 열차 사이가 넓습니다. 발 빠짐에 주의하세요.`);
        else speak(`우리 열차는 마지막 역인 ${next} 역에 도착합니다. 안녕히 가십시오.`);
    }

    window.onload = initRoute;
</script>
